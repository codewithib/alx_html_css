<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover Full Block with Flexbox</title>
  <style>
    /* Flexbox Parent Container */
    .flex-container {
      display: flex;
      flex-direction: column; /* Stack items vertically */
      width: 300px; /* Set container width */
    }

    /* Flex Items */
    .flex-item {
      padding: 15px 20px; /* Add padding for spacing */
      background-color: #f4f4f4; /* Default background color */
      margin-bottom: 5px; /* Add spacing between items */
      text-align: center; /* Center text */
      transition: background-color 0.3s; /* Smooth hover effect */
    }

    .flex-item:hover {
      background-color: #007BFF; /* Change background on hover */
      color: #fff; /* Change text color on hover */
    }

    /* Optional: Styling Links */
    .flex-item a {
      text-decoration: none; /* Remove underline */
      color: inherit; /* Inherit color from parent */
      display: flex; /* Make the link behave as a block */
    }
  </style>
</head>
<body>
  <div class="flex-container">
    <div class="flex-item"><a href="#">Home</a></div>
    <div class="flex-item"><a href="#">About</a></div>
    <div class="flex-item"><a href="#">Services</a></div>
    <div class="flex-item"><a href="#">Contact</a></div>
  </div>
</body>
</html>
